services:
  ai-router:
    container_name: ai-router
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./models:/app/models
      - ai-router-logs:/app/logs
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
      MODEL_DIR: /app/models
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_DEVICE: cpu
    deploy:
      resources:
        limits:
          memory: 2.5G
    depends_on:
      - ollama
    networks:
      - internal_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "health_check.py"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped

volumes:
  ai-router-logs:

networks:
  internal_net:
    external: true
